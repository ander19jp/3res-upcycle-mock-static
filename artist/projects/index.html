<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>artist console (mock) - /artist/projects</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--shadow: 0 10px 30px rgba(0,0,0,.08);--radius:16px;--brand:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--text);
      background:linear-gradient(180deg,#eef2ff 0%, var(--bg) 30%, var(--bg) 100%);}
    .wrap{max-width:980px;margin:0 auto;padding:28px 16px 48px;}
    header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
    h1{margin:0 0 6px;font-size:26px} p{margin:0;color:var(--muted)}
    nav a{display:inline-block;margin-right:10px;color:#1d4ed8;text-decoration:none;font-size:13px}
    nav a:hover{text-decoration:underline}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .list{display:grid;gap:10px;margin-top:12px}
    .item{border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fafafa}
    .item b{display:block} .meta{color:var(--muted);font-size:12px}
    .btn{background:var(--brand);color:#fff;border:0;border-radius:999px;padding:10px 12px;font-weight:700;cursor:pointer;font-size:13px;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>artist console (mock)</h1>
        <p>/artist/projects の静的モックです（Next.js なし / HTMLのみ）。</p>
        <nav>
          <a href="/artist/projects">/artist/projects</a>
          <a href="/artist/apply">/artist/apply</a>
        </nav>
      </div>
    </header>

    <div class="card">
      <b>案件一覧（ダミー）</b>
      <div class="list">
        <div class="item">
          <div>
            <b>アップサイクルTシャツ</b>
            <div class="meta">ABCブランド / 受注 3/5 / 受注受付中</div>
          </div>
          <a class="btn" href="/artist/apply">申請へ</a>
        </div>
        <div class="item">
          <div>
            <b>アップサイクルスウェット</b>
            <div class="meta">まる / 受注 5/5 / 在庫到着確認</div>
          </div>
          <a class="btn" href="/artist/apply">申請へ</a>
        </div>
        <div class="item">
          <div>
            <b>テスト on the test</b>
            <div class="meta">イセキオンライン / 受注 2/5 / 差戻し対応</div>
          </div>
          <a class="btn" href="/artist/apply">申請へ</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
