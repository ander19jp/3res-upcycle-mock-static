<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3REs mock（静的）</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--shadow: 0 10px 30px rgba(0,0,0,.08);--radius:16px;--brand:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--text);
      background:linear-gradient(180deg,#eef2ff 0%, var(--bg) 30%, var(--bg) 100%);}
    .wrap{max-width:860px;margin:0 auto;padding:32px 16px 48px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    h1{margin:0 0 8px;font-size:26px} p{margin:0;color:var(--muted);line-height:1.6}
    .links{display:grid;gap:10px;margin-top:14px}
    a{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;text-decoration:none;color:inherit;background:#fafafa}
    a:hover{border-color:rgba(37,99,235,.4)}
    .tag{font-size:12px;color:#1d4ed8;background:rgba(37,99,235,.10);border:1px solid rgba(37,99,235,.22);padding:4px 10px;border-radius:999px;white-space:nowrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>3REs mock（静的HTML）</h1>
      <p>Vercelにそのままデプロイできる静的サイト構成です。Next.js不要で、URLパスは <b>フォルダ構成</b> で表現しています。</p>
      <div class="links">
        <a href="/artist/projects"><span>/artist/projects</span><span class="tag">案件一覧モック</span></a>
        <a href="/artist/apply"><span>/artist/apply</span><span class="tag">申請フォームモック</span></a>
      </div>
    </div>
  </div>
</body>
</html>
